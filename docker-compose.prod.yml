services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: article_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-super-secure-pg-pass-2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://thearticleanalyzer.com/api
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend

volumes:
  postgres_data:
